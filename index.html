<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#060d18">

<title>Dino Paradies</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
:root{
  --b0:#060d18;--b1:#091426;--b2:#0d1e3a;--b3:#162a55;
  --blue:#2d6be4;--blue2:#4d8eff;--accent:#00d4ff;
  --green:#2ecc71;--amber:#f39c12;--red:#e74c3c;
  --text:#e8f4ff;--text2:#7eb3ff;
}
html,body{height:100%;overflow:hidden;font-family:'Nunito',sans-serif;background:#060d18;color:var(--text)}
#hud{height:46px;display:flex;align-items:center;gap:8px;padding:0 10px;
  background:rgba(6,13,24,0.97);border-bottom:1px solid rgba(77,142,255,0.22);
  flex-shrink:0;z-index:50;position:relative}
.hlogo{font-family:'Fredoka One',cursive;font-size:1.1rem;
  background:linear-gradient(90deg,var(--accent),var(--blue2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
.hsep{width:1px;height:20px;background:rgba(77,142,255,0.18);flex-shrink:0}
.hres{display:flex;gap:5px;flex:1;align-items:center;flex-wrap:wrap}
.rc{display:flex;align-items:center;gap:3px;background:rgba(45,107,228,0.14);
  border:1px solid rgba(77,142,255,0.2);border-radius:20px;padding:3px 9px;
  font-size:0.75rem;font-weight:800;white-space:nowrap}
.rv{color:white}
.hright{display:flex;gap:4px;flex-shrink:0}
.spd{background:rgba(45,107,228,0.16);border:1px solid rgba(77,142,255,0.25);border-radius:7px;
  padding:3px 8px;color:var(--text2);cursor:pointer;font-size:0.75rem;font-weight:800;
  font-family:'Nunito',sans-serif;transition:all .18s}
.spd.on{background:var(--blue);border-color:var(--blue2);color:white;box-shadow:0 0 10px rgba(45,107,228,.35)}
#main{flex:1;display:flex;overflow:hidden;position:relative}
#wrap{flex:1;overflow:hidden;position:relative;touch-action:none}
#cvs{display:block}
/* Toolbar */
#tb{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  display:flex;gap:5px;align-items:center;flex-wrap:wrap;justify-content:center;
  background:rgba(6,13,24,0.95);border:1px solid rgba(77,142,255,0.28);
  border-radius:24px;padding:6px 10px;z-index:60;
  box-shadow:0 4px 20px rgba(0,212,255,0.12);max-width:calc(100vw - 224px)}
.tbl{font-size:.58rem;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:var(--accent)}
.t{background:rgba(45,107,228,0.13);border:1.5px solid rgba(77,142,255,0.18);
  border-radius:11px;padding:5px 9px;cursor:pointer;font-size:.7rem;font-weight:800;
  color:var(--text2);transition:all .14s;white-space:nowrap;font-family:'Nunito',sans-serif}
.t:hover{background:rgba(45,107,228,.28);border-color:var(--blue2)}
.t.on{background:rgba(0,212,255,0.18);border-color:var(--accent);color:var(--accent);
  box-shadow:0 0 10px rgba(0,212,255,.22)}
.tsep{width:1px;height:22px;background:rgba(77,142,255,0.18)}
/* Enc palette */
#epal{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);
  background:rgba(6,13,24,.97);border:1px solid rgba(77,142,255,.28);
  border-radius:14px;padding:10px 12px;z-index:70;display:none;
  box-shadow:0 4px 18px rgba(0,212,255,.12);min-width:220px}
.ep-t{font-size:.68rem;font-weight:800;color:var(--accent);margin-bottom:6px}
.ep-colors{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.epc{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .14s}
.epc.sel{border-color:white;transform:scale(1.15)}
.ep-btn{padding:5px 12px;border:1.5px solid var(--blue2);border-radius:10px;
  color:var(--text2);font-weight:800;font-size:.72rem;cursor:pointer;
  background:rgba(45,107,228,.18);font-family:'Nunito',sans-serif;margin-right:5px}
.ep-btn.g{border-color:#2ecc71;color:#2ecc71;background:rgba(46,204,113,.15)}
/* Sidebar */
#sb{width:208px;flex-shrink:0;
  background:rgba(6,13,24,.98);border-left:1px solid rgba(77,142,255,.18);
  display:flex;flex-direction:column;overflow:hidden}
.stabs{display:flex;border-bottom:1px solid rgba(77,142,255,.16)}
.stab{flex:1;padding:7px 2px;border:none;background:transparent;
  color:rgba(255,255,255,.28);font-size:.62rem;font-weight:800;cursor:pointer;
  font-family:'Nunito',sans-serif;border-bottom:2px solid transparent;transition:all .18s}
.stab.on{color:var(--accent);border-bottom-color:var(--accent)}
.sc{flex:1;overflow-y:auto;padding:8px;
  scrollbar-width:thin;scrollbar-color:rgba(77,142,255,.2) transparent}
.bl{font-size:.58rem;font-weight:900;text-transform:uppercase;letter-spacing:1px;
  color:var(--accent);margin:8px 0 5px;display:flex;align-items:center;gap:4px}
.bl::after{content:'';flex:1;height:1px;background:rgba(0,212,255,.14)}
/* Research tree item */
.ritem{background:rgba(45,107,228,.09);border:1.5px solid rgba(77,142,255,.14);
  border-radius:9px;padding:7px;margin-bottom:5px;cursor:pointer;transition:all .14s}
.ritem:hover{background:rgba(45,107,228,.2);border-color:var(--blue2)}
.ritem.done{border-color:#2ecc71;background:rgba(46,204,113,.1)}
.ritem.locked{opacity:.35;cursor:not-allowed}
.ri-top{display:flex;align-items:center;gap:7px;margin-bottom:3px}
.ri-em{font-size:1.4rem}
.ri-n{font-weight:800;color:white;font-size:.78rem}
.ri-c{font-size:.6rem;color:var(--amber);font-weight:700}
.ri-desc{font-size:.64rem;color:var(--text2);line-height:1.4}
/* Dino cards */
.dcard{background:rgba(45,107,228,.08);border:1px solid rgba(77,142,255,.12);border-radius:9px;
  padding:7px;margin-bottom:5px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .13s}
.dcard:hover{background:rgba(45,107,228,.18)}
.dem{font-size:1.6rem;flex-shrink:0}
.db{flex:1;min-width:0}
.dn{font-weight:800;color:white;font-size:.78rem}
.ds{font-size:.62rem;color:var(--text2)}
.hbar{height:4px;border-radius:2px;background:rgba(255,255,255,.08);margin-top:4px;overflow:hidden}
.hf{height:100%;border-radius:2px;transition:width .4s}
.fdb{padding:3px 7px;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.28);
  border-radius:7px;color:var(--accent);font-weight:800;font-size:.62rem;cursor:pointer;
  font-family:'Nunito',sans-serif;flex-shrink:0}
/* Stats */
.srow{display:flex;justify-content:space-between;padding:5px 0;
  border-bottom:1px solid rgba(77,142,255,.08);font-size:.72rem}
.srow:last-child{border:none}
.sk{color:var(--text2)}.sv{font-weight:800;color:white}
.tip{background:rgba(45,107,228,.07);border:1px solid rgba(77,142,255,.13);
  border-radius:9px;padding:7px;margin-top:7px;font-size:.68rem;color:var(--text2);line-height:1.55}
.tip b{color:var(--accent)}
/* Modals */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;
  display:none;align-items:flex-end;justify-content:center}
.mbg.open{display:flex}
.msh{background:linear-gradient(180deg,#0d1e3a 0%,#060d18 100%);
  border:1px solid rgba(77,142,255,.28);border-radius:20px 20px 0 0;
  padding:1.1rem;width:100%;max-width:480px;max-height:84vh;overflow-y:auto;
  animation:up .24s ease;box-shadow:0 -5px 28px rgba(45,107,228,.22)}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mh{width:32px;height:4px;background:rgba(77,142,255,.28);border-radius:2px;margin:0 auto .85rem}
.mclose{width:100%;margin-top:.85rem;padding:.62rem;background:rgba(77,142,255,.1);
  border:1px solid rgba(77,142,255,.2);border-radius:11px;color:var(--text2);
  font-family:'Nunito',sans-serif;font-weight:800;cursor:pointer;font-size:.86rem}
.di-name{font-family:'Fredoka One',cursive;font-size:1.65rem;
  background:linear-gradient(90deg,var(--accent),var(--blue2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:.6rem 0}
.sbox{background:rgba(45,107,228,.1);border:1px solid rgba(77,142,255,.16);border-radius:9px;padding:.55rem;text-align:center}
.sv2{font-weight:800;font-size:.9rem;color:white}
.sk2{font-size:.6rem;color:var(--text2);margin-top:2px}
.fp{background:rgba(0,212,255,.05);border-left:3px solid var(--accent);
  border-radius:0 9px 9px 0;padding:.65rem;margin:.5rem 0;
  font-size:.76rem;color:rgba(255,255,255,.85);line-height:1.6}
.fk{background:rgba(45,107,228,.09);border:1.5px solid rgba(77,142,255,.2);
  border-radius:9px;padding:.65rem;font-size:.76rem;color:rgba(255,255,255,.9);line-height:1.55}
.fk::before{content:'🦕  '}
.badge{display:inline-block;font-size:.58rem;font-weight:800;padding:2px 7px;border-radius:10px;margin-bottom:.4rem}
.bc{background:rgba(231,76,60,.18);color:#ff9999}
.bh{background:rgba(46,204,113,.18);color:#99ffbb}
.bf{background:rgba(0,212,255,.12);color:#aaeeff}
.bw{background:rgba(52,152,219,.18);color:#99ccff}
.abtn{width:100%;padding:.62rem;border:none;border-radius:11px;font-family:'Nunito',sans-serif;
  font-weight:800;font-size:.86rem;cursor:pointer;margin-top:5px}
.af{background:linear-gradient(135deg,#27ae60,#2ecc71);color:white}
.dpgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:.5rem}
.dpitem{background:rgba(45,107,228,.1);border:1.5px solid rgba(77,142,255,.16);
  border-radius:11px;padding:9px;cursor:pointer;text-align:center;transition:all .13s}
.dpitem:hover{background:rgba(45,107,228,.24);border-color:var(--blue2)}
.dpitem.locked{opacity:.28;cursor:not-allowed}
.dp-em{font-size:1.9rem;margin-bottom:3px}
/* Quiz */
.qmode{display:flex;background:rgba(45,107,228,.1);border-radius:20px;padding:3px;margin-bottom:10px;gap:3px}
.qmb{flex:1;padding:4px;border:none;border-radius:17px;font-family:'Nunito',sans-serif;
  font-weight:800;font-size:.75rem;cursor:pointer;transition:all .18s}
.qmb.on{background:var(--blue);color:white}
.qmb:not(.on){background:transparent;color:rgba(255,255,255,.35)}
.qq{font-size:.93rem;font-weight:800;color:white;text-align:center;margin-bottom:.85rem;line-height:1.4}
.qopts{display:flex;flex-direction:column;gap:6px}
.qopt{padding:.62rem 1rem;background:rgba(45,107,228,.09);border:1.5px solid rgba(77,142,255,.16);
  border-radius:10px;color:white;font-weight:700;font-size:.84rem;cursor:pointer;text-align:left;
  transition:all .12s;font-family:'Nunito',sans-serif}
.qopt:hover{background:rgba(45,107,228,.24);border-color:var(--blue2)}
.qopt.correct{background:rgba(46,204,113,.22);border-color:#2ecc71}
.qopt.wrong{background:rgba(231,76,60,.22);border-color:#e74c3c}
.qfact{background:rgba(0,212,255,.06);border-left:3px solid var(--accent);
  border-radius:0 9px 9px 0;padding:.65rem;margin-top:.65rem;
  font-size:.76rem;color:rgba(255,255,255,.88);line-height:1.55;display:none}
.qrew{text-align:center;color:#f1c40f;font-weight:800;font-size:.84rem;margin-top:5px;display:none}
.qnext{width:100%;margin-top:.65rem;padding:.62rem;background:var(--blue);color:white;border:none;
  border-radius:11px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.88rem;cursor:pointer;display:none}
/* Notif */
.notif{position:fixed;top:54px;left:50%;transform:translateX(-50%) translateY(-5px);
  background:rgba(6,13,24,.97);border:1.5px solid var(--accent);color:white;
  padding:5px 15px;border-radius:20px;font-weight:700;font-size:.78rem;z-index:400;
  opacity:0;transition:all .26s;white-space:nowrap;max-width:90vw;text-align:center;pointer-events:none}
.notif.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* Quiz FAB */
#qfab{position:absolute;bottom:76px;right:12px;width:48px;height:48px;border-radius:50%;border:none;
  background:linear-gradient(135deg,var(--blue),var(--accent));font-size:1.2rem;cursor:pointer;
  box-shadow:0 4px 16px rgba(0,212,255,.38);z-index:80;transition:transform .14s;
  display:flex;align-items:center;justify-content:center}
#qfab:active{transform:scale(.88)}
/* Alert popup */
#alert-box{position:fixed;top:60px;left:50%;transform:translateX(-50%);
  background:rgba(9,18,38,.97);border:1.5px solid var(--amber);
  border-radius:14px;padding:10px 16px;z-index:500;display:none;
  max-width:280px;text-align:center;box-shadow:0 4px 20px rgba(243,156,18,.25)}
#alert-box .at{font-size:.8rem;font-weight:800;color:var(--amber);margin-bottom:4px}
#alert-box .ab{font-size:.72rem;color:var(--text2);line-height:1.45}
/* mobile */
#bot{display:none;background:rgba(6,13,24,.98);border-top:1px solid rgba(77,142,255,.16);flex-shrink:0}
.btabs{display:flex}
.btab{flex:1;padding:7px 0;border:none;background:transparent;color:rgba(255,255,255,.28);
  font-size:.56rem;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;
  display:flex;flex-direction:column;align-items:center;gap:2px;transition:color .18s}
.btab.on{color:var(--accent)}.bti{font-size:1.05rem}
@media(max-width:640px){
  #sb{display:none}
  #sb.mopen{display:flex;position:fixed;right:0;top:0;bottom:0;z-index:150;width:212px}
  #bot{display:block}
  #qfab{bottom:104px}
  #tb{max-width:calc(100vw - 16px)}
}
</style>

  // 1. Apple touch icon (for iOS "Add to Home Screen")
  const ati = document.createElement('link');
  ati.rel = 'apple-touch-icon';
  ati.href = ICON192;
  document.head.appendChild(ati);

  // 2. iOS meta tags
  const metas = [
    ['apple-mobile-web-app-capable', 'yes'],
    ['apple-mobile-web-app-status-bar-style', 'black-translucent'],
    ['apple-mobile-web-app-title', 'Dino Paradies'],
  ];
  metas.forEach(([n,v]) => {
    const m = document.createElement('meta');
    m.name = n; m.content = v;
    document.head.appendChild(m);
  });

  // 3. Inline manifest as blob URL
  const manifest = {
    name: 'Dino Paradies',
    short_name: 'Dino Paradies',
    description: 'Baue deinen eigenen Dinosaurier-Park!',
    start_url: './',
    display: 'standalone',
    background_color: '#060d18',
    theme_color: '#060d18',
    orientation: 'any',
    icons: [
      { src: ICON192, sizes: '192x192', type: 'image/png', purpose: 'any maskable' },
      { src: ICON512, sizes: '512x512', type: 'image/png', purpose: 'any maskable' }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
  const manifestUrl = URL.createObjectURL(blob);
  const mlink = document.createElement('link');
  mlink.rel = 'manifest';
  mlink.href = manifestUrl;
  document.head.appendChild(mlink);

  // 4. Install banner (injected into body when ready)
  function injectBanner() {
    if (document.getElementById('dp-install-banner')) return;
    const banner = document.createElement('div');
    banner.id = 'dp-install-banner';
    banner.style.cssText = [
      'display:none', 'position:fixed', 'bottom:0', 'left:0', 'right:0',
      'background:linear-gradient(135deg,#0d1e3a 0%,#091426 100%)',
      'border-top:2px solid rgba(0,212,255,.5)',
      'padding:14px 16px', 'z-index:9999',
      'box-shadow:0 -6px 28px rgba(0,212,255,.2)',
      'font-family:Nunito,sans-serif',
      'animation:slideUpBanner .3s ease'
    ].join(';');
    banner.innerHTML = `
      <style>
        @keyframes slideUpBanner { from { transform:translateY(100%) } to { transform:translateY(0) } }
        #dp-install-banner button { -webkit-tap-highlight-color:transparent; }
      </style>
      <div style="display:flex;align-items:center;gap:12px;max-width:480px;margin:0 auto">
        <img src="${ICON192}" width="52" height="52"
          style="border-radius:13px;flex-shrink:0;box-shadow:0 4px 12px rgba(0,212,255,.3)">
        <div style="flex:1;min-width:0">
          <div style="font-weight:900;color:white;font-size:.95rem;margin-bottom:2px">
            🦕 Dino Paradies
          </div>
          <div id="dp-banner-sub"
            style="font-size:.72rem;color:rgba(255,255,255,.58);line-height:1.35">
            Als App installieren — immer verfügbar, kein Browser!
          </div>
        </div>
        <button id="dp-install-btn"
          style="padding:9px 18px;background:linear-gradient(135deg,#2d6be4,#00d4ff);
          border:none;border-radius:12px;color:white;font-family:Nunito,sans-serif;
          font-weight:800;font-size:.84rem;cursor:pointer;flex-shrink:0;
          box-shadow:0 4px 16px rgba(0,212,255,.45);white-space:nowrap">
          Installieren
        </button>
        <button onclick="window.__dpDismissInstall()"
          style="padding:7px 9px;background:rgba(255,255,255,.08);border:none;
          border-radius:9px;color:rgba(255,255,255,.45);font-size:.9rem;
          cursor:pointer;flex-shrink:0;line-height:1">✕</button>
      </div>`;
    document.body.appendChild(banner);
  }

  // Dismiss helper
  window.__dpDismissInstall = function() {
    const b = document.getElementById('dp-install-banner');
    if (b) b.style.display = 'none';
    try { localStorage.setItem('dp_install_dismissed', '1'); } catch(e) {}
  };

  // 5. Android / Chrome: listen for native prompt
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    injectBanner();
    const dismissed = (() => { try { return localStorage.getItem('dp_install_dismissed'); } catch(e) { return null; } })();
    if (!dismissed) {
      setTimeout(() => {
        const b = document.getElementById('dp-install-banner');
        if (b) b.style.display = 'block';
      }, 1800);
    }
    document.getElementById('dp-install-btn')?.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      window.__dpDismissInstall();
      if (outcome === 'accepted') {
        const n = document.getElementById('dp-banner-sub');
        if (n) n.textContent = '✓ Wird installiert...';
        setTimeout(window.__dpDismissInstall, 2000);
      }
    });
  });

  window.addEventListener('appinstalled', () => {
    window.__dpDismissInstall();
    deferredPrompt = null;
  });

  // 6. iOS Safari: manual install hint (no beforeinstallprompt)
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  const isStandalone = window.navigator.standalone;
  if (isIOS && !isStandalone) {
    const dismissed = (() => { try { return localStorage.getItem('dp_install_dismissed'); } catch(e) { return null; } })();
    if (!dismissed) {
      setTimeout(() => {
        injectBanner();
        const sub = document.getElementById('dp-banner-sub');
        if (sub) sub.innerHTML = 'Safari: <b style="color:#00d4ff">Teilen ⬆</b> → <b style="color:#00d4ff">"Zum Home-Bildschirm"</b>';
        const btn = document.getElementById('dp-install-btn');
        if (btn) {
          btn.textContent = 'Anleitung';
          btn.onclick = () => {
            alert('So geht\'s auf iPhone/iPad:\n\n1. Tippe das Teilen-Symbol ⬆ unten in Safari\n2. Scrolle runter zu \"Zum Home-Bildschirm\"\n3. Tippe \"Hinzufügen\"\n\nDann erscheint das Dino Paradies-Icon auf deinem Startbildschirm! 🦕');
          };
        }
        const b = document.getElementById('dp-install-banner');
        if (b) b.style.display = 'block';
      }, 2000);
    }
  }
})();
</script>

// ==================== CANVAS ====================
const cvs=document.getElementById('cvs');
const ctx=cvs.getContext('2d');
let W,H;

// ==================== ISLAND GENERATION ====================
const ISLAND_R=2200; // radius of island
const WORLD=5000;    // total world size
let islandCache=null;
let terrainCanvas=null;

// Simplex-like noise via seeded pseudo-random
function seededRand(x,y,s=42){
  let h=s^(x*374761393)^(y*668265263);
  h=(h^(h>>13))*1274126177;h=h^(h>>16);
  return(h>>>0)/4294967296;
}
function smoothNoise(x,y,freq,s){
  const gx=Math.floor(x*freq),gy=Math.floor(y*freq);
  const fx=(x*freq)-gx,fy=(y*freq)-gy;
  const a=seededRand(gx,gy,s),b=seededRand(gx+1,gy,s);
  const c=seededRand(gx,gy+1,s),d=seededRand(gx+1,gy+1,s);
  const ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy);
  return a+(b-a)*ux+(c-a)*uy+(a-b-c+d)*ux*uy;
}
function fbm(x,y,oct=5,s=42){
  let v=0,amp=1,freq=1,max=0;
  for(let i=0;i<oct;i++){v+=smoothNoise(x,y,freq,s+i*100)*amp;max+=amp;amp*=0.5;freq*=2.1;}
  return v/max;
}

// Terrain types based on height
function terrainType(nx,ny,dist){
  const r=dist/ISLAND_R;
  if(r>1.0)return'deep';
  if(r>0.88)return'shallow';
  if(r>0.82)return'beach';
  const h=fbm(nx,ny,6,7);
  if(h>0.72)return'mountain';
  if(h>0.62)return'highland';
  if(h>0.45)return'forest';
  if(h>0.32)return'grass';
  return'lowland';
}

const TERRAIN_COLS={
  deep:'#0a1e3a',
  shallow:'#1a4a7a',
  beach:'#c8a86a',
  lowland:'#4a7a3a',
  grass:'#3a6a2a',
  forest:'#2a5a1a',
  highland:'#5a6a4a',
  mountain:'#7a7a6a',
};

function buildTerrainCanvas(){
  const res=4; // pixels per terrain sample
  const size=Math.ceil(WORLD/res);
  const tc=document.createElement('canvas');
  tc.width=size;tc.height=size;
  const tctx=tc.getContext('2d');
  const img=tctx.createImageData(size,size);
  const cx=WORLD/2,cy=WORLD/2;
  for(let py=0;py<size;py++){
    for(let px=0;px<size;px++){
      const wx=px*res,wy=py*res;
      const dx=wx-cx,dy=wy-cy;
      const dist=Math.sqrt(dx*dx+dy*dy);
      // Add coastline variation
      const angle=Math.atan2(dy,dx);
      const coastal=fbm(Math.cos(angle)*3+10,Math.sin(angle)*3+10,3,99)*300;
      const adjDist=dist-coastal;
      const nx=wx/WORLD*6,ny=wy/WORLD*6;
      const t=terrainType(nx,ny,adjDist);
      let r,g,b;
      switch(t){
        case'deep':r=10;g=30;b=58;break;
        case'shallow':r=20;g=65;b=100;break;
        case'beach':r=200;g=170;b=106;break;
        case'lowland':r=74;g=122;b=58;break;
        case'grass':r=58;g=106;b=42;break;
        case'forest':r=38;g=88;b=24;break;
        case'highland':r=88;g=106;b=74;break;
        case'mountain':r=122;g=122;b=106;break;
        default:r=10;g=30;b=58;
      }
      // Add micro-variation
      const mv=(seededRand(px,py,33)-0.5)*14;
      const i=(py*size+px)*4;
      img.data[i]=Math.max(0,Math.min(255,r+mv));
      img.data[i+1]=Math.max(0,Math.min(255,g+mv));
      img.data[i+2]=Math.max(0,Math.min(255,b+mv));
      img.data[i+3]=255;
    }
  }
  tctx.putImageData(img,0,0);
  // Draw forest trees
  tctx.fillStyle='rgba(20,60,10,0.5)';
  for(let i=0;i<3000;i++){
    const tx=seededRand(i,0,77)*WORLD;
    const ty=seededRand(i,1,77)*WORLD;
    const ddx=tx-cx,ddy=ty-cy;
    const dd=Math.sqrt(ddx*ddx+ddy*ddy);
    const an=Math.atan2(ddy,ddx);
    const ca=fbm(Math.cos(an)*3+10,Math.sin(an)*3+10,3,99)*300;
    if(dd-ca>ISLAND_R*0.82)continue;
    const nh=fbm(tx/WORLD*6,ty/WORLD*6,6,7);
    if(nh>0.45&&nh<0.72){
      const ts=(seededRand(i,2,77)*6+3)/res;
      tctx.beginPath();
      tctx.arc(tx/res,ty/res,ts,0,Math.PI*2);
      tctx.fill();
    }
  }
  // Shore foam
  tctx.strokeStyle='rgba(255,255,255,0.25)';tctx.lineWidth=3/res;
  for(let i=0;i<200;i++){
    const an=Math.random()*Math.PI*2;
    const coastal2=fbm(Math.cos(an)*3+10,Math.sin(an)*3+10,3,99)*300;
    const sr=ISLAND_R*0.86+coastal2+Math.random()*40-20;
    const sx=cx+Math.cos(an)*sr,sy=cy+Math.sin(an)*sr;
    tctx.beginPath();
    tctx.arc(sx/res,sy/res,(Math.random()*20+8)/res,0,Math.PI*2);
    tctx.stroke();
  }
  return tc;
}

// ==================== WORLD OBJECTS (trees, rocks scattered) ====================
let worldObjects=[];
function generateWorldObjects(){
  const cx=WORLD/2,cy=WORLD/2;
  worldObjects=[];
  const rng=(i,s)=>seededRand(i,s,55);
  for(let i=0;i<1200;i++){
    const wx=rng(i,0)*WORLD,wy=rng(i,1)*WORLD;
    const dx=wx-cx,dy=wy-cy;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const an=Math.atan2(dy,dx);
    const coastal=fbm(Math.cos(an)*3+10,Math.sin(an)*3+10,3,99)*300;
    if(dist-coastal>ISLAND_R*0.78)continue;
    const nh=fbm(wx/WORLD*6,wy/WORLD*6,6,7);
    if(nh<0.38||nh>0.74)continue;
    const type=rng(i,2)<0.7?'tree':'rock';
    const sz=type==='tree'?(rng(i,3)*10+8):(rng(i,3)*7+5);
    worldObjects.push({x:wx,y:wy,type,sz,r:rng(i,4)*Math.PI*2});
  }
}

// ==================== CAMERA ====================
function clampCam(){
  const z=G.zoom;
  const margin=Math.min(300,W*0.4);
  const maxX=margin, minX=-(WORLD*z-W+margin);
  const maxY=margin, minY=-(WORLD*z-H+margin);
  G.cam.x=Math.min(maxX,Math.max(minX,G.cam.x));
  G.cam.y=Math.min(maxY,Math.max(minY,G.cam.y));
}
// world -> screen
function w2s(wx,wy){return{x:wx*G.zoom+G.cam.x, y:wy*G.zoom+G.cam.y}}
// screen -> world
function s2w(sx,sy){return{x:(sx-G.cam.x)/G.zoom, y:(sy-G.cam.y)/G.zoom}}

// Zoom around a screen-space pivot point
function zoomAt(factor, pivotSx, pivotSy){
  const newZoom=Math.min(ZOOM_MAX,Math.max(ZOOM_MIN,G.zoom*factor));
  if(newZoom===G.zoom)return;
  // Adjust cam so world point under pivot stays fixed
  const wx=(pivotSx-G.cam.x)/G.zoom;
  const wy=(pivotSy-G.cam.y)/G.zoom;
  G.zoom=newZoom;
  G.cam.x=pivotSx-wx*G.zoom;
  G.cam.y=pivotSy-wy*G.zoom;
  clampCam();
}

// ==================== HELPERS ====================
function ptInPoly(px,py,pts){
  let inside=false;
  for(let i=0,j=pts.length-1;i<pts.length;j=i++){
    const xi=pts[i].x,yi=pts[i].y,xj=pts[j].x,yj=pts[j].y;
    if(((yi>py)!==(yj>py))&&px<(xj-xi)*(py-yi)/(yj-yi)+xi)inside=!inside;
  }
  return inside;
}
function polyBounds(pts){
  let x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;
  pts.forEach(p=>{x0=Math.min(x0,p.x);y0=Math.min(y0,p.y);x1=Math.max(x1,p.x);y1=Math.max(y1,p.y);});
  return{x0,y0,x1,y1,cx:(x0+x1)/2,cy:(y0+y1)/2,w:x1-x0,h:y1-y0};
}
function polyArea(pts){
  let a=0;
  for(let i=0,j=pts.length-1;i<pts.length;j=i++)a+=(pts[j].x+pts[i].x)*(pts[j].y-pts[i].y);
  return Math.abs(a)/2;
}
function isUnlocked(dino){
  if(!dino.unlock)return true;
  return G.research.find(r=>r.id===dino.unlock)?.done||false;
}
function randRange(a,b){return a+(b-a)*Math.random();}

// ==================== DINO ANIMATIONS ====================
function initAgent(enc,dinoId){
  const d=DINOS.find(x=>x.id===dinoId);if(!d)return null;
  const b=enc.bounds;
  return{
    dinoId,id:Date.now()+Math.random(),
    x:b.cx+randRange(-40,40),y:b.cy+randRange(-40,40),
    vx:randRange(-1,1)*d.spd,vy:randRange(-1,1)*d.spd,
    dir:1,bobT:Math.random()*6.28,tailT:Math.random()*6.28,legT:Math.random()*6.28,
    state:'walk',stateT:0,happiness:5,
    isAlpha:false,chaseId:null,fleeId:null,_flock:null,socialT:0,roarT:0,
    fedAt:Date.now(),
  };
}
function updateAgent(ag,enc){
  const d=DINOS.find(x=>x.id===ag.dinoId);if(!d)return;
  ag.bobT+=.07;ag.tailT+=.1;ag.legT+=.14;ag.stateT--;
  if(!ag.socialT)ag.socialT=0;ag.socialT--;
  if(!ag.roarT)ag.roarT=0;ag.roarT--;
  const dr=G.research.find(r=>r.id==='r_happy')?.done?.003:.007;
  ag.happiness=Math.max(1,ag.happiness-dr*G.speed);

  // Herding: herbivores flock
  if(d.type==='herbivore'){
    const peers=enc.dinos.filter(a=>a!==ag&&a.dinoId===ag.dinoId);
    if(peers.length>0&&ag.socialT<=0){
      ag.socialT=50+Math.random()*60;
      const near=peers.reduce((b,p)=>Math.hypot(p.x-ag.x,p.y-ag.y)<Math.hypot(b.x-ag.x,b.y-ag.y)?p:b,peers[0]);
      ag._flock=Math.hypot(near.x-ag.x,near.y-ag.y)>80?near:null;
    }
  }
  // Carnivore: hunt
  if(d.type==='carnivore'){
    if(!enc.dinos.find(a=>a.isAlpha&&a.dinoId===ag.dinoId))ag.isAlpha=true;
    if(ag.socialT<=0){
      const prey=enc.dinos.filter(a=>a!==ag&&DINOS.find(x=>x.id===a.dinoId)?.type==='herbivore');
      if(prey.length&&Math.random()<.012){
        ag.socialT=130;const p=prey[Math.floor(Math.random()*prey.length)];
        ag.chaseId=p.id;ag.state='chase';ag.stateT=90;ag.roarT=18;
        p.fleeId=ag.id;p.state='flee';p.stateT=90;
      }
    }
  }
  // State transitions
  if(ag.stateT<=0){
    ag.chaseId=null;ag.fleeId=null;
    const rv=Math.random();
    if(rv<.07){ag.state='idle';ag.stateT=40+Math.random()*80;}
    else if(rv<.11){ag.state='eat';ag.stateT=25+Math.random()*50;ag.happiness=Math.min(5,ag.happiness+.3);}
    else if(rv<.13&&ag.isAlpha){ag.state='roar';ag.stateT=22;ag.roarT=22;}
    else{ag.state='walk';ag.stateT=60+Math.random()*120;ag.vx=randRange(-1,1)*d.spd*1.4;ag.vy=randRange(-1,1)*d.spd*1.4;}
  }
  if(['roar','idle','eat'].includes(ag.state))return;
  if(ag.state==='chase'&&ag.chaseId){
    const tgt=enc.dinos.find(a=>a.id===ag.chaseId);
    if(tgt){const dx=tgt.x-ag.x,dy=tgt.y-ag.y,dist=Math.sqrt(dx*dx+dy*dy)||1;
      ag.vx=dx/dist*d.spd*2;ag.vy=dy/dist*d.spd*2;
      if(dist<22){tgt.happiness=Math.max(1,tgt.happiness-.4);tgt.state='idle';tgt.stateT=40;ag.state='idle';ag.stateT=30;ag.chaseId=null;}
    }else ag.chaseId=null;
  }else if(ag.state==='flee'&&ag.fleeId){
    const src=enc.dinos.find(a=>a.id===ag.fleeId);
    if(src){const dx=ag.x-src.x,dy=ag.y-src.y,dist=Math.sqrt(dx*dx+dy*dy)||1;ag.vx=dx/dist*d.spd*2.2;ag.vy=dy/dist*d.spd*2.2;}
    else ag.fleeId=null;
  }else if(ag._flock){
    const dx=ag._flock.x-ag.x,dy=ag._flock.y-ag.y,dist=Math.sqrt(dx*dx+dy*dy)||1;
    ag.vx=ag.vx*.85+dx/dist*d.spd*.45;ag.vy=ag.vy*.85+dy/dist*d.spd*.45;
  }
  ag.x+=ag.vx;ag.y+=ag.vy;
  if(ag.vx>.05)ag.dir=1;else if(ag.vx<-.05)ag.dir=-1;
  if(!ptInPoly(ag.x,ag.y,enc.pts)){
    const b=enc.bounds,dx=b.cx-ag.x,dy=b.cy-ag.y,dist=Math.sqrt(dx*dx+dy*dy)||1;
    ag.vx=dx/dist*d.spd+randRange(-.2,.2);ag.vy=dy/dist*d.spd+randRange(-.2,.2);
    ag.x+=ag.vx*3;ag.y+=ag.vy*3;
  }
}

// ==================== DINO DRAWING ====================
const DS=0.36;
function fi(c){ctx.fillStyle=c}
function st(c,w){ctx.strokeStyle=c;ctx.lineWidth=w;ctx.lineCap='round';ctx.lineJoin='round'}
function el(x,y,rx,ry,rot){ctx.beginPath();ctx.ellipse(x,y,rx,ry,rot||0,0,Math.PI*2);ctx.fill();}
function ci(x,y,r){ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();}
function pa(pts){ctx.beginPath();pts.forEach(([x,y],i)=>i?ctx.lineTo(x,y):ctx.moveTo(x,y));ctx.stroke();}
function tr(x1,y1,x2,y2,x3,y3){ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.lineTo(x3,y3);ctx.closePath();ctx.fill();}
function s5(t){return Math.sin(t)*5}

function drawAgent(ag){
  const d=DINOS.find(x=>x.id===ag.dinoId);if(!d)return;
  const{x:sx,y:sy}=w2s(ag.x,ag.y);
  if(sx<-80||sy<-80||sx>W+80||sy>H+80)return;
  const DS=.36;
  ctx.save();ctx.translate(sx,sy);ctx.scale(ag.dir*DS,DS);drawDinoShape(d,ag);ctx.restore();
  const ico=ag.state==='eat'?'\u{1F343}':ag.state==='idle'?'\u{1F4A4}':ag.state==='roar'?'\u{1F4E2}':ag.state==='chase'?'\u{1F4A8}':ag.state==='flee'?'\u{1F631}':null;
  if(ico){ctx.save();ctx.font='9px serif';ctx.textAlign='center';ctx.fillText(ico,sx+5*ag.dir,sy-13);ctx.restore();}
  if(ag.isAlpha){ctx.save();ctx.font='9px serif';ctx.textAlign='center';ctx.fillText('\u{1F451}',sx,sy-20);ctx.restore();}
  if(ag.roarT>0){ctx.save();ctx.beginPath();ctx.arc(sx,sy,(18-ag.roarT)*4,0,Math.PI*2);ctx.strokeStyle='rgba(255,200,50,'+(ag.roarT/18*.55)+')';ctx.lineWidth=2;ctx.stroke();ctx.restore();}
  if(ag.happiness<3){
    ctx.save();const bw=20,bx=sx-bw/2,by=sy-16;
    ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(bx,by,bw,3);
    ctx.fillStyle=ag.happiness>2?'#f39c12':'#e74c3c';ctx.fillRect(bx,by,bw*(ag.happiness/5),3);ctx.restore();
  }
}

function drawDinoShape(d,a){
  const bob=Math.sin(a.bobT)*2;

      [[-4,1],[4,-1]].forEach(([ox,p])=>{
        ctx.save();ctx.translate(ox,10+bob);ctx.rotate(lA*p*Math.PI/180);
        st(d.col2,5);pa([[0,0],[0,16]]);st(d.col2,3);pa([[0,16],[5,20]]);ctx.restore();

      fi(d.col);el(0,bob,16,10,.1);fi(d.belly);el(0,3+bob,8,6,0);

      fi('white');ci(25,-24,2.5);fi('#111');ci(25.5,-24,1.2);
      st(d.col2,3);pa([[14,-18],[30,-17+jaw]]);
      break;}
  }
}

// ==================== DRAW VISITORS ====================
const BICONS={gate:'🚪',shop:'🏪',rest:'🍔',medical:'🏥',ranger:'🏕️',heli:'🚁',tree:'🌴',rock:'🪨'};
const BCOLS={gate:'#1e3a6a',shop:'#1a3a4a',rest:'#3a2a1a',medical:'#1a3a2a',ranger:'#2a3a1a',heli:'#2a2a3a',tree:'#1a3a1a',rock:'#3a3a2a'};
const VCOLS=['#4ecdc4','#ff9f43','#a29bfe','#fd79a8','#55efc4','#ffeaa7','#74b9ff'];
const VHAIR=['#3a2a1a','#1a0a00','#c8a050','#ff7a7a','#888','#d4d4d4'];
function drawVisitor(v){
  const{x:sx,y:sy}=w2s(v.x,v.y);
  if(sx<-20||sy<-20||sx>W+20||sy>H+20)return;
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.22)';ctx.beginPath();ctx.ellipse(sx,sy+12,5,2,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=v.col;ctx.beginPath();ctx.ellipse(sx,sy+6,4,6,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#f5cba7';ctx.beginPath();ctx.arc(sx,sy,4.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=v.hair;ctx.beginPath();ctx.arc(sx,sy-2,4.5,Math.PI,0);ctx.fill();
  const ls=v.walking?Math.sin(v.walkT*.28)*9:0;
  ctx.strokeStyle=v.col;ctx.lineWidth=2.5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(sx,sy+12);ctx.lineTo(sx-3+ls,sy+18);ctx.stroke();
  ctx.beginPath();ctx.moveTo(sx,sy+12);ctx.lineTo(sx+3-ls,sy+18);ctx.stroke();
  ctx.font='9px serif';ctx.textAlign='center';ctx.fillText(v.mood,sx,sy-8);
  ctx.restore();
}

// ==================== MAIN DRAW ====================
function draw(){
  ctx.clearRect(0,0,W,H);

  // Ocean background
  ctx.fillStyle='#0a1e3a';
  ctx.fillRect(0,0,W,H);

  // Terrain — draw scaled
  if(terrainCanvas){
    const res=4; // terrain canvas is WORLD/res pixels
    const tw=terrainCanvas.width, th=terrainCanvas.height;
    // Source rect in terrain coords
    const srcX=Math.max(0,-G.cam.x/(G.zoom*res));
    const srcY=Math.max(0,-G.cam.y/(G.zoom*res));
    const srcW=Math.min(tw-srcX, W/(G.zoom*res));
    const srcH=Math.min(th-srcY, H/(G.zoom*res));
    // Dest rect in screen coords
    const dstX=Math.max(0,G.cam.x);
    const dstY=Math.max(0,G.cam.y);
    const dstW=srcW*res*G.zoom;
    const dstH=srcH*res*G.zoom;
    if(srcW>0&&srcH>0&&dstW>0&&dstH>0){
      ctx.drawImage(terrainCanvas, srcX, srcY, srcW, srcH, dstX, dstY, dstW, dstH);
    }
  }

  // All world-space objects: use ctx transform for zoom
  ctx.save();
  ctx.translate(G.cam.x, G.cam.y);
  ctx.scale(G.zoom, G.zoom);

  // World objects
  worldObjects.forEach(o=>drawWorldObjLocal(o));
  // Roads
  G.roads.forEach(r=>drawRoadLocal(r));
  // Enclosures
  G.enclosures.forEach(e=>drawEnclosureLocal(e));
  // Buildings
  G.buildings.forEach(b=>drawBuildingLocal(b));

  ctx.restore();

  // Dinos & visitors at screen coords (already use w2s internally, draw without extra transform)
  G.enclosures.forEach(enc=>enc.dinos&&enc.dinos.forEach(ag=>drawAgent(ag)));
  G.visitors.forEach(v=>drawVisitor(v));

  // Drawing previews
  if(G.drawing&&G.drawPts.length>0){
    const et=ENC_TYPES[G.encType];
    ctx.save();
    ctx.beginPath();
    G.drawPts.forEach((p,i)=>{const{x,y}=w2s(p.x,p.y);i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
    ctx.strokeStyle=et.fence;ctx.lineWidth=3;ctx.setLineDash([8,6]);ctx.stroke();ctx.setLineDash([]);
    G.drawPts.forEach(p=>{const{x,y}=w2s(p.x,p.y);fi(et.fence);ci(x,y,5);});
    if(G.drawPts.length>2){
      const{x:fx,y:fy}=w2s(G.drawPts[0].x,G.drawPts[0].y);
      const{x:lx,y:ly}=w2s(G.drawPts[G.drawPts.length-1].x,G.drawPts[G.drawPts.length-1].y);
      ctx.strokeStyle='rgba(0,212,255,0.35)';ctx.lineWidth=2;ctx.setLineDash([5,5]);
      ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(fx,fy);ctx.stroke();ctx.setLineDash([]);
    }
    ctx.restore();
  }
  if(G.roadDrawing&&G.roadPts.length>0){
    ctx.save();ctx.beginPath();
    G.roadPts.forEach((p,i)=>{const{x,y}=w2s(p.x,p.y);i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
    ctx.strokeStyle='rgba(180,150,100,0.7)';ctx.lineWidth=Math.max(2,8*G.zoom);ctx.lineCap='round';ctx.setLineDash([10,8]);ctx.stroke();ctx.setLineDash([]);
    ctx.restore();
  }

  // Minimap (always visible, bottom-left)
  drawMinimap();

  // Zoom level indicator
  ctx.save();
  ctx.font='bold 10px Nunito';ctx.fillStyle='rgba(255,255,255,0.45)';ctx.textAlign='left';
  ctx.fillText(`${Math.round(G.zoom*100)}%`,10,H-10);
  ctx.restore();
}

// Local draw helpers (called inside ctx transform, so no w2s needed — coords are world coords directly)
function drawWorldObjLocal(obj){
  const x=obj.x, y=obj.y;
  ctx.save();ctx.translate(x,y);
  if(obj.type==='tree'){
    ctx.fillStyle='#4a2a0a';ctx.fillRect(-obj.sz*.25,-obj.sz*.1,obj.sz*.5,obj.sz*.9);
    ctx.fillStyle='rgba(0,0,0,0.18)';ctx.beginPath();ctx.ellipse(0,obj.sz*.3,obj.sz*.7,obj.sz*.2,0,0,Math.PI*2);ctx.fill();
    [[0,-.3],[-.2,-.55],[.2,-.5],[0,-.78]].forEach(([ox,oy])=>{
      ctx.fillStyle=`hsl(${120+seededRand(Math.floor(x/10),Math.floor(y/10),12)*20},${50+seededRand(Math.floor(x/10),Math.floor(y/10),13)*20}%,${25+seededRand(Math.floor(x/10),Math.floor(y/10),14)*15}%)`;
      ctx.beginPath();ctx.arc(ox*obj.sz,oy*obj.sz+obj.sz*.3,obj.sz*.55,0,Math.PI*2);ctx.fill();
    });
  } else {
    ctx.fillStyle='rgba(0,0,0,0.2)';ctx.beginPath();ctx.ellipse(obj.sz*.15,obj.sz*.3,obj.sz*.85,obj.sz*.28,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`hsl(${30+seededRand(Math.floor(x/10),0,99)*20},${10+seededRand(0,Math.floor(y/10),99)*15}%,${45+seededRand(Math.floor(x/10),Math.floor(y/10),99)*20}%)`;
    ctx.beginPath();ctx.rotate(obj.r);ctx.ellipse(0,0,obj.sz,obj.sz*.65,.2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.1)';ctx.beginPath();ctx.ellipse(-obj.sz*.2,-obj.sz*.2,obj.sz*.3,obj.sz*.15,-.3,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

function drawRoadLocal(road){
  if(road.pts.length<2)return;
  ctx.save();
  ctx.beginPath();
  road.pts.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));
  ctx.strokeStyle='rgba(180,150,100,0.8)';ctx.lineWidth=10;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();
  ctx.strokeStyle='rgba(220,190,140,0.4)';ctx.lineWidth=3;ctx.setLineDash([12,10]);ctx.stroke();ctx.setLineDash([]);
  ctx.restore();
}

function drawEnclosureLocal(enc){
  if(enc.points.length<3)return;
  const et=ENC_TYPES[enc.typeIdx||0];
  ctx.save();
  ctx.beginPath();
  enc.points.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));
  ctx.closePath();
  ctx.fillStyle=et.col;ctx.fill();
  // Interior texture
  ctx.save();ctx.clip();
  ctx.fillStyle='rgba(255,255,255,0.04)';
  const b=enc.bounds;
  for(let tx=b.x0;tx<b.x1;tx+=32)for(let ty=b.y0;ty<b.y1;ty+=24){
    if(ptInPoly(tx,ty,enc.points)){
      ctx.beginPath();ctx.arc(tx+Math.sin((tx+ty)*0.1)*6,ty+Math.cos((tx-ty)*0.1)*6,4,0,Math.PI*2);ctx.fill();
    }
  }
  ctx.restore();
  // Fence
  ctx.beginPath();
  enc.points.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));
  ctx.closePath();
  ctx.strokeStyle=et.fence;ctx.lineWidth=4;ctx.lineJoin='round';ctx.stroke();
  enc.points.forEach(p=>{
    ctx.fillStyle='#8b6914';ctx.fillRect(p.x-4,p.y-4,8,8);
    ctx.fillStyle='#c8a030';ctx.fillRect(p.x-2,p.y-2,4,4);
  });
  ctx.restore();
  // Label — scale font inversely so it's always readable
  const labelScale=1/G.zoom;
  const{cx,cy}=enc.bounds;
  ctx.save();
  ctx.translate(cx,cy);ctx.scale(labelScale,labelScale);
  ctx.font='bold 12px Nunito';ctx.textAlign='center';ctx.textBaseline='middle';
  if(enc.dinos&&enc.dinos.length>0){
    const names=[...new Set(enc.dinos.map(ag=>DINOS.find(d=>d.id===ag.dinoId)?.n))];
    ctx.fillStyle='rgba(255,255,255,0.65)';
    ctx.fillText(`${names.join(' + ')} (${enc.dinos.length})`,0,-18);
  } else {
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fillText('Leer — tippe zum Befüllen',0,0);
  }
  ctx.restore();
}

function drawBuildingLocal(b){
  const R=22;
  ctx.save();ctx.translate(b.x,b.y);
  // Scale building inversely at low zoom so icons stay legible
  const s=Math.max(1,1/G.zoom);
  ctx.scale(s,s);
  ctx.fillStyle='rgba(0,0,0,0.25)';ctx.beginPath();ctx.ellipse(2,4,R,R*.4,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=BCOLS[b.type]||'#1a2a3a';ctx.beginPath();ctx.arc(0,0,R,0,Math.PI*2);ctx.fill();
  if(['gate','medical','ranger'].includes(b.type)){
    ctx.strokeStyle='rgba(0,212,255,0.5)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,R+2,0,Math.PI*2);ctx.stroke();
  }
  ctx.font=`${R*0.9}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(BICONS[b.type]||'?',0,1);
  ctx.font='bold 9px Nunito';ctx.fillStyle='rgba(255,255,255,0.75)';
  const labels={gate:'EINGANG',shop:'SHOP',rest:'ESSEN',medical:'SANITÄR',ranger:'RANGER',heli:'HELIPAD'};
  if(labels[b.type])ctx.fillText(labels[b.type],0,R+10);
  ctx.restore();
}

// ==================== MINIMAP ====================
function drawMinimap(){
  const MW=160, MH=120;
  const MX=10, MY=H-MH-10;
  const scale=MW/WORLD;
  ctx.save();
  // Background
  ctx.fillStyle='rgba(6,13,24,0.88)';
  ctx.strokeStyle='rgba(77,142,255,0.4)';ctx.lineWidth=1;
  ctx.beginPath();ctx.roundRect(MX-2,MY-2,MW+4,MH+4,6);ctx.fill();ctx.stroke();
  // Terrain thumbnail (just redraw terrain canvas scaled down)
  if(terrainCanvas){
    ctx.save();
    ctx.beginPath();ctx.roundRect(MX,MY,MW,MH,4);ctx.clip();
    ctx.drawImage(terrainCanvas,0,0,terrainCanvas.width,terrainCanvas.height,MX,MY,MW,MH);
    ctx.restore();
  }
  // Enclosures on minimap
  G.enclosures.forEach(enc=>{
    const et=ENC_TYPES[enc.typeIdx||0];
    ctx.beginPath();
    enc.points.forEach((p,i)=>{
      const mx=MX+p.x*scale, my=MY+p.y*scale;
      i?ctx.lineTo(mx,my):ctx.moveTo(mx,my);
    });
    ctx.closePath();
    ctx.fillStyle=et.col;ctx.fill();
    ctx.strokeStyle=et.fence;ctx.lineWidth=1.5;ctx.stroke();
  });
  // Roads
  G.roads.forEach(r=>{
    if(r.pts.length<2)return;
    ctx.beginPath();
    r.pts.forEach((p,i)=>{const mx=MX+p.x*scale,my=MY+p.y*scale;i?ctx.lineTo(mx,my):ctx.moveTo(mx,my);});
    ctx.strokeStyle='rgba(200,170,120,0.8)';ctx.lineWidth=1.5;ctx.lineCap='round';ctx.stroke();
  });
  // Buildings
  G.buildings.forEach(b=>{
    const mx=MX+b.x*scale, my=MY+b.y*scale;
    ctx.fillStyle='rgba(0,212,255,0.9)';
    ctx.beginPath();ctx.arc(mx,my,2.5,0,Math.PI*2);ctx.fill();
  });
  // Viewport rect
  const vx=MX+(-G.cam.x/G.zoom)*scale;
  const vy=MY+(-G.cam.y/G.zoom)*scale;
  const vw=(W/G.zoom)*scale;
  const vh=(H/G.zoom)*scale;
  ctx.strokeStyle='rgba(255,255,255,0.7)';ctx.lineWidth=1.5;ctx.setLineDash([3,2]);
  ctx.strokeRect(vx,vy,vw,vh);ctx.setLineDash([]);
  // Label
  ctx.font='bold 8px Nunito';ctx.fillStyle='rgba(255,255,255,0.5)';ctx.textAlign='left';
  ctx.fillText('KARTE',MX+2,MY-4);
  ctx.restore();
}
// Click on minimap to jump camera
const MINIMAP_X=10, MINIMAP_Y_OFFSET=130; // from bottom
cvs.addEventListener('click',e=>{
  const p=getPos(e);
  const MY=H-MINIMAP_Y_OFFSET;
  const MW=160,MH=120,MX=10;
  if(p.x>=MX&&p.x<=MX+MW&&p.y>=MY&&p.y<=MY+MH){
    const scale=MW/WORLD;
    const wx=(p.x-MX)/scale, wy=(p.y-MY)/scale;
    G.cam.x=W/2-wx*G.zoom;G.cam.y=H/2-wy*G.zoom;clampCam();
  }
});

// ==================== GAME LOOP ====================
const TICK_MS=[null,2200,800,280];let lastT=0;
function loop(ts){
  requestAnimationFrame(loop);
  G.enclosures.forEach(e=>e.dinos&&e.dinos.forEach(ag=>updateAgent(ag,e)));
  updateVisitors();
  if(ts-lastT>TICK_MS[G.speed]){lastT=ts;tick();}
  draw();
}
function tick(){
  G.tick++;
  if(G.tick%20===0){G.day++;dayIncome();tickEggs();maybeFireEvent();if(G.heatwave&&Math.random()<.3)G.heatwave=false;}
  if(G.tick%5===0)spawnVisitor();
  // Research progress
  if(G.activeResearch){
    G.researchTimer--;
    if(G.researchTimer<=0){
      const r=G.research.find(x=>x.id===G.activeResearch);
      if(r){r.done=true;notify(`🔬 ${r.n} abgeschlossen!`);showAlert('Forschung abgeschlossen!',`${r.n}: ${r.desc}`);}
      G.activeResearch=null;
      if(curTab==='research')renderTab();
    }
    document.getElementById('hr').textContent=G.activeResearch?
      Math.round((1-G.researchTimer/(G.research.find(r=>r.id===G.activeResearch)?.time*20||1))*100)+'%':
      (G.research.filter(r=>r.done).length*10)+'%';
  }
  calcSat();
  if(G.tick%8===0)updateHUD();
}
function dayIncome(){
  const hasPremium=G.research.find(r=>r.id==='research_income')?.done;
  const bonus=hasPremium?1.5:1;
  G.enclosures.forEach(enc=>{
    if(!enc.dinos||!enc.dinos.length)return;
    enc.dinos.forEach(ag=>{
      const d=DINOS.find(x=>x.id===ag.dinoId);
      if(d)G.money+=d.inc*bonus;
    });
  });
  G.buildings.filter(b=>b.type==='shop').forEach(()=>G.money+=Math.round(25*bonus));
  G.buildings.filter(b=>b.type==='rest').forEach(()=>G.money+=Math.round(35*bonus));
  G.buildings.filter(b=>b.type==='heli').forEach(()=>G.money+=60);
}
function calcSat(){
  let s=30;
  const allDinos=G.enclosures.reduce((a,e)=>a+(e.dinos?e.dinos.length:0),0);
  s+=Math.min(allDinos*7,50);
  const avgHap=allDinos>0?G.enclosures.reduce((a,e)=>a+(e.dinos||[]).reduce((s2,ag)=>s2+ag.happiness,0),0)/allDinos:3;
  s+=(avgHap-3)*8;
  if(G.buildings.find(b=>b.type==='shop'))s+=8;
  if(G.buildings.find(b=>b.type==='rest'))s+=10;
  if(G.buildings.find(b=>b.type==='medical'))s+=7;
  if(G.buildings.find(b=>b.type==='ranger'))s+=8;
  const hasCapacity=G.research.find(r=>r.id==='research_capacity')?.done;
  G.maxVisitors=hasCapacity?25:12;
  G.sat=Math.min(100,Math.max(0,Math.round(s)));
  G.rating=Math.ceil(G.sat/20);
  document.getElementById('hs').textContent='⭐'.repeat(Math.min(5,G.rating));
}
function updateHUD(){
  document.getElementById('hm').textContent=G.money.toLocaleString('de-CH');
  document.getElementById('hv').textContent=G.visitors.length;
  document.getElementById('hd').textContent=G.day;
}

// ==================== VISITORS ====================
function spawnVisitor(){
  const gate=G.buildings.find(b=>b.type==='gate');
  const encs=G.enclosures.filter(e=>e.dinos&&e.dinos.length>0);
  if(!gate||!encs.length)return;
  if(G.visitors.length>=G.maxVisitors)return;
  if(Math.random()>0.35)return;
  const target=encs[Math.floor(Math.random()*encs.length)];
  G.visitors.push({
    x:gate.x,y:gate.y,
    col:VCOLS[Math.floor(Math.random()*VCOLS.length)],
    hair:VHAIR[Math.floor(Math.random()*VHAIR.length)],
    tx:target.bounds.cx,ty:target.bounds.cy,target,
    mood:'😊',happy:88+Math.random()*12,
    spd:.5+Math.random()*.6,state:'walk',waitT:0,walkT:0,walking:true,
  });
}
function updateVisitors(){
  const shops=G.buildings.filter(b=>['shop','rest'].includes(b.type));
  G.visitors.forEach((v,i)=>{
    v.walkT++;
    if(v.state==='leave'){v.x-=v.spd*.7;v.y-=v.spd*.3;if(v.x<G.cam.x-200)G.visitors.splice(i,1);return;}
    if(v.state==='wait'){v.waitT--;
      if(v.waitT<=0){
        if(shops.length&&Math.random()<.45){const s=shops[Math.floor(Math.random()*shops.length)];v.tx=s.x;v.ty=s.y;v.state='walk';}
        else v.state='leave';
      }v.walking=false;return;}
    const dx=v.tx-v.x,dy=v.ty-v.y,dist=Math.sqrt(dx*dx+dy*dy);
    v.walking=dist>6;
    if(dist<7){v.state='wait';v.waitT=50+Math.floor(Math.random()*100);v.mood='🤩';
      v.happy=Math.min(100,v.happy+6);G.money+=8;}
    else{v.x+=dx/dist*v.spd+(Math.random()-.5)*.35;v.y+=dy/dist*v.spd+(Math.random()-.5)*.35;}
    v.happy-=.003;
    if(v.happy<40){v.mood='😞';v.state='leave';}
    else if(v.happy<65)v.mood='😐';
    else if(v.happy<82)v.mood='😊';
    else v.mood='🤩';
  });
}

// ==================== INPUT ====================
function getPos(e){const r=cvs.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top}}
let pDown=0;

cvs.addEventListener('mousedown',e=>{
  const p=getPos(e);pDown=Date.now();
  G.drag={on:false,sx:p.x,sy:p.y,cx:G.cam.x,cy:G.cam.y};
  if(G.tool==='enc'){G.drawing=true;const w=s2w(p.x,p.y);G.drawPts=[{x:w.x,y:w.y}];G.drag.on=true;}
  if(G.tool==='road'){G.roadDrawing=true;const w=s2w(p.x,p.y);G.roadPts=[{x:w.x,y:w.y}];G.drag.on=true;}
});
cvs.addEventListener('mousemove',e=>{
  const p=getPos(e);
  const dx=p.x-G.drag.sx,dy=p.y-G.drag.sy;
  if(G.tool==='pan'&&(Math.abs(dx)>3||Math.abs(dy)>3)){
    G.drag.on=true;G.cam.x=G.drag.cx+dx;G.cam.y=G.drag.cy+dy;clampCam();
  }
  if(G.tool==='enc'&&G.drawing&&G.drag.on){
    const last=G.drawPts[G.drawPts.length-1];const w=s2w(p.x,p.y);
    if(!last||Math.hypot(w.x-last.x,w.y-last.y)>22)G.drawPts.push({x:w.x,y:w.y});
  }
  if(G.tool==='road'&&G.roadDrawing&&G.drag.on){
    const last=G.roadPts[G.roadPts.length-1];const w=s2w(p.x,p.y);
    if(!last||Math.hypot(w.x-last.x,w.y-last.y)>20)G.roadPts.push({x:w.x,y:w.y});
  }
});
cvs.addEventListener('mouseup',e=>{
  if(G.tool==='enc'&&G.drawing){
    if(G.drawPts.length>=4)finishEnc();else{G.drawing=false;G.drawPts=[];}
    G.drag.on=false;return;
  }
  if(G.tool==='road'&&G.roadDrawing){
    if(G.roadPts.length>=2){G.roads.push({id:Date.now(),pts:[...G.roadPts]});notify('Strasse gebaut!');}
    G.roadDrawing=false;G.roadPts=[];G.drag.on=false;return;
  }
  if(G.drag.on&&G.tool==='pan'){G.drag.on=false;return;}
  const p=getPos(e);if(Date.now()-pDown>500)return;
  handleTap(p.x,p.y);G.drag.on=false;
});
cvs.addEventListener('touchstart',e=>{
  e.preventDefault();const t=e.touches[0];const p=getPos(t);pDown=Date.now();
  G.drag={on:false,sx:p.x,sy:p.y,cx:G.cam.x,cy:G.cam.y};
  if(G.tool==='enc'){G.drawing=true;const w=s2w(p.x,p.y);G.drawPts=[{x:w.x,y:w.y}];G.drag.on=true;}
  if(G.tool==='road'){G.roadDrawing=true;const w=s2w(p.x,p.y);G.roadPts=[{x:w.x,y:w.y}];G.drag.on=true;}
},{passive:false});
cvs.addEventListener('touchmove',e=>{
  e.preventDefault();const t=e.touches[0];const p=getPos(t);
  const dx=p.x-G.drag.sx,dy=p.y-G.drag.sy;
  if(G.tool==='pan'){G.drag.on=true;G.cam.x=G.drag.cx+dx;G.cam.y=G.drag.cy+dy;clampCam();}
  if(G.tool==='enc'&&G.drawing){G.drag.on=true;const last=G.drawPts[G.drawPts.length-1];const w=s2w(p.x,p.y);if(!last||Math.hypot(w.x-last.x,w.y-last.y)>18)G.drawPts.push({x:w.x,y:w.y});}
  if(G.tool==='road'&&G.roadDrawing){G.drag.on=true;const last=G.roadPts[G.roadPts.length-1];const w=s2w(p.x,p.y);if(!last||Math.hypot(w.x-last.x,w.y-last.y)>18)G.roadPts.push({x:w.x,y:w.y});}
},{passive:false});
cvs.addEventListener('touchend',e=>{
  e.preventDefault();
  if(G.tool==='enc'&&G.drawing){if(G.drawPts.length>=4)finishEnc();else{G.drawing=false;G.drawPts=[];}G.drag.on=false;return;}
  if(G.tool==='road'&&G.roadDrawing){if(G.roadPts.length>=2){G.roads.push({id:Date.now(),pts:[...G.roadPts]});notify('Strasse gebaut!');}G.roadDrawing=false;G.roadPts=[];G.drag.on=false;return;}
  if(G.drag.on&&G.tool==='pan'){G.drag.on=false;return;}
  const t=e.changedTouches[0];if(Date.now()-pDown>450)return;
  handleTap(getPos(t).x,getPos(t).y);G.drag.on=false;
},{passive:false});
cvs.addEventListener('wheel',e=>{
  e.preventDefault();
  if(e.ctrlKey||Math.abs(e.deltaY)>Math.abs(e.deltaX)){
    // Zoom
    const factor=e.deltaY<0?1.1:0.9;
    const p=getPos(e);
    zoomAt(factor,p.x,p.y);
  } else {
    // Pan
    G.cam.x-=e.deltaX*.8;G.cam.y-=e.deltaY*.8;clampCam();
  }
},{passive:false});

// Pinch-to-zoom
let lastPinchDist=0;
cvs.addEventListener('touchstart',e2=>{
  if(e2.touches.length===2){
    const dx=e2.touches[0].clientX-e2.touches[1].clientX;
    const dy=e2.touches[0].clientY-e2.touches[1].clientY;
    lastPinchDist=Math.sqrt(dx*dx+dy*dy);
  }
},{passive:true,capture:true});
cvs.addEventListener('touchmove',e2=>{
  if(e2.touches.length===2){
    e2.preventDefault();
    const dx=e2.touches[0].clientX-e2.touches[1].clientX;
    const dy=e2.touches[0].clientY-e2.touches[1].clientY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(lastPinchDist>0){
      const factor=dist/lastPinchDist;
      const r=cvs.getBoundingClientRect();
      const px=(e2.touches[0].clientX+e2.touches[1].clientX)/2-r.left;
      const py=(e2.touches[0].clientY+e2.touches[1].clientY)/2-r.top;
      zoomAt(factor,px,py);
    }
    lastPinchDist=dist;
  }
},{passive:false,capture:true});

function handleTap(sx,sy){
  const w=s2w(sx,sy);
  if(G.tool==='del'){
    const ei=G.enclosures.findIndex(e=>ptInPoly(w.x,w.y,e.points));
    if(ei>=0){G.enclosures.splice(ei,1);notify('Gehege entfernt');return;}
    const bi=G.buildings.findIndex(b=>Math.hypot(b.x-w.x,b.y-w.y)<28);
    if(bi>=0){G.buildings.splice(bi,1);notify('Gebäude entfernt');return;}
    const ri=G.roads.findIndex(r=>r.pts.some(p=>Math.hypot(p.x-w.x,p.y-w.y)<20));
    if(ri>=0){G.roads.splice(ri,1);notify('Strasse entfernt');return;}
    return;
  }
  if(G.tool==='place'&&G.placeItem){
    placeBuilding(w.x,w.y,G.placeItem);return;
  }
  if(G.tool==='enc'&&!G.drag.on){
    if(!G.drawing){G.drawing=true;G.drawPts=[{x:w.x,y:w.y}];}
    else{
      const fp=G.drawPts[0];
      if(Math.hypot(w.x-fp.x,w.y-fp.y)<35&&G.drawPts.length>3)finishEnc();
      else G.drawPts.push({x:w.x,y:w.y});
    }
    return;
  }
  // Click on enclosure
  const enc=G.enclosures.find(e=>ptInPoly(w.x,w.y,e.points));
  if(enc){openDinoPicker(enc);return;}
  // Click on building
  const bld=G.buildings.find(b=>Math.hypot(b.x-w.x,b.y-w.y)<28);
  if(bld){openBuildingDetail(bld);return;}
  // Click on dino agent
  for(const enc2 of G.enclosures){
    if(!enc2.dinos)continue;
    for(const ag of enc2.dinos){
      if(Math.hypot(ag.x-w.x,ag.y-w.y)<20){openAgentDetail(enc2,ag);return;}
    }
  }
}

// ==================== ENC DRAWING ====================
function finishEnc(){
  if(G.drawPts.length<3){notify('Mehr Punkte nötig!');G.drawing=false;G.drawPts=[];return;}
  const area=polyArea(G.drawPts);
  if(area<3000){notify('Gehege zu klein! Grösser zeichnen.');G.drawing=false;G.drawPts=[];return;}
  const cost=Math.max(300,Math.floor(area/800)*12);
  if(G.money<cost){notify(`Zu wenig Geld! Kostet ${cost}.`);G.drawing=false;G.drawPts=[];return;}
  G.money-=cost;
  const bounds=polyBounds(G.drawPts);
  const enc={id:Date.now(),points:[...G.drawPts],typeIdx:G.encType,bounds,dinos:[]};
  G.enclosures.push(enc);
  G.drawing=false;G.drawPts=[];
  notify(`Gehege gebaut! (-${cost}) Tippe rein um Dinos einzusetzen.`);
  updateHUD();renderTab();
  setTimeout(()=>openDinoPicker(enc),350);
}
function cancelEnc(){G.drawing=false;G.drawPts=[];}

// ==================== BUILDING PLACEMENT ====================
function setPlaceItem(id){
  G.placeItem=id;setTool('place');
  document.getElementById('place-picker').style.display='none';
  notify('Tippe auf die Insel um das Gebäude zu platzieren!');
}
function placeBuilding(wx,wy,type){
  const bd=BUILDINGS.find(b=>b.id===type);if(!bd)return;
  if(G.money<bd.cost){notify('Nicht genug Geld!');return;}
  // Check on island
  const cx=WORLD/2,cy=WORLD/2;
  const dist=Math.hypot(wx-cx,wy-cy);
  if(dist>ISLAND_R*0.9){notify('Ausserhalb der Insel!');return;}
  G.money-=bd.cost;
  const nb={id:Date.now(),type,x:wx,y:wy};G.buildings.push(nb);mpSend({type:'bld',bld:nb});
  notify(`${bd.em} ${bd.n} gebaut!`);
  G.placeItem=null;setTool('pan');
  updateHUD();renderTab();
}
function openBuildingDetail(b){
  const bd=BUILDINGS.find(x=>x.id===b.type);
  showAlert(bd?.em+' '+bd?.n,`Klicke 🗑️ Löschen und dann auf das Gebäude um es zu entfernen.`);
}

// ==================== DINO PICKER ====================
let pickerEnc=null;
function openDinoPicker(enc){
  G.lastPickerEnc=enc;
  window.pickerEnc=enc;
  pickerEnc=enc;
  document.getElementById('dp-info').textContent=
    `${enc.dinos.length} Tier${enc.dinos.length===1?'':'e'} im Gehege. Mehrere der gleichen Sorte möglich!`;
  document.getElementById('dp-grid').innerHTML=DINOS.map(d=>{
    const unlocked=isUnlocked(d);
    const cnt=enc.dinos.filter(a=>a.dinoId===d.id).length;
    const canAff=G.money>=d.cost;
    const bc={carnivore:'bc',herbivore:'bh',flying:'bf',water:'bw'}[d.type];
    return '<div class="dpitem '+(unlocked&&canAff?'':'locked')+'"' +' onclick="'+(unlocked?'addDino(\''+d.id+'\')':'')+'"' +' style="position:relative">'+'<div class="dp-em">'+d.em+'</div>'+'<div style="font-weight:800;font-size:.78rem;color:white">'+d.n+(cnt>0?' <span style="color:var(--accent)">'+cnt+'x</span>':'')+'</div>'+'<span class="badge '+bc+'" style="font-size:.54rem">'+d.diet+'</span>'+'<div class="dp-cost">💰 '+d.cost+'</div>'+'</div>';
  }).join('');
  document.getElementById('dino-picker').classList.add('open');
}
function addDino(dinoId){
  if(!pickerEnc)return;
  const d=DINOS.find(x=>x.id===dinoId);
  if(G.money<d.cost){notify('Nicht genug Geld!');return;}
  G.money-=d.cost;
  pickerEnc.dinos.push(initAgent(pickerEnc,dinoId));
  notify(`${d.em} ${d.n} eingezogen! ${pickerEnc.dinos.length}x im Gehege.`);
  updateHUD();renderTab();
  openDinoPicker(pickerEnc);
}

function feedAg_inner(encId,dinoId){
  const enc=G.enclosures.find(e=>e.id===encId);if(!enc)return;
  const ag=enc.dinos.find(a=>a.dinoId===dinoId);if(!ag)return;
  ag.happiness=Math.min(5,ag.happiness+2);ag.fedAt=Date.now();
  const d=DINOS.find(x=>x.id===dinoId);notify(`${d.em} satt und glücklich! ❤️`);
  mpSend({type:'feed',encId,agId:ag.id});
  document.getElementById('dm').classList.remove('open');renderTab();
}
function releaseAg(encId,dinoId){
  const enc=G.enclosures.find(e=>e.id===encId);if(!enc)return;
  const idx=enc.dinos.findIndex(a=>a.dinoId===dinoId);if(idx<0)return;
  const d=DINOS.find(x=>x.id===dinoId);
  G.money+=Math.floor(d.cost*.5);enc.dinos.splice(idx,1);
  document.getElementById('dm').classList.remove('open');
  notify(`${d.em} entlassen. +${Math.floor(d.cost*.5)}`);updateHUD();renderTab();
}

// ==================== TOOL ====================
function setTool(t){
  G.tool=t;
  document.querySelectorAll('.t').forEach(b=>b.classList.remove('on'));
  const el=document.getElementById('t-'+t);if(el)el.classList.add('on');
  const epal=document.getElementById('epal');
  if(t==='enc')epal.style.display='block';
  else{epal.style.display='none';G.drawing=false;G.drawPts=[];}
  if(t==='road'){G.roadDrawing=false;G.roadPts=[];}
  cvs.style.cursor=t==='pan'?'grab':t==='del'?'not-allowed':t==='place'?'cell':'crosshair';
}
function setSpd(s){G.speed=s;[1,2,3].forEach(i=>document.getElementById('s'+i).classList.toggle('on',i===s));}

// ==================== SIDEBAR ====================
let curTab='ops';
function goTab(t){
  curTab=t;
  document.querySelectorAll('.stab').forEach((b,i)=>b.classList.toggle('on',['ops','research','dinos','hatch','mp'][i]===t));
  renderTab();
}
function mobTab(t){
  const sb=document.getElementById('sb');
  if(sb.classList.contains('mopen')&&curTab===t){sb.classList.remove('mopen');return;}
  sb.classList.add('mopen');
  document.querySelectorAll('.btab').forEach((b,i)=>b.classList.toggle('on',['ops','research','dinos','hatch','mp'][i]===t));
  goTab(t);
}
cvs.addEventListener('touchstart',()=>document.getElementById('sb').classList.remove('mopen'),{passive:true});

function renderTab(){
  if(curTab==='ops')renderOps();
  else if(curTab==='research')renderResearch();
  else if(curTab==='hatch')renderHatch();
  else if(curTab==='mp')renderMpTab();
  else renderDinosTab();
}

function getTips(){
  const tips=[];
  if(!G.buildings.find(b=>b.type==='gate'))tips.push('• Setze einen <b>Eingang</b> auf der Insel!');
  if(!G.enclosures.length)tips.push('• Zeichne dein erstes Gehege!');
  if(G.enclosures.length&&!G.enclosures.find(e=>e.dinos&&e.dinos.length))tips.push('• Tippe auf ein Gehege und setze Dinos ein!');
  if(!G.research.find(r=>r.done))tips.push('• Starte Forschung um neue Dinos freizuschalten!');
  if(tips.length===0)tips.push('Bau weiter aus! Mehr Dinos = mehr Einnahmen! 🦕');
  return tips.join('<br>');
}

function startResearch(id){
  const r=G.research.find(x=>x.id===id);if(!r||r.done)return;
  if(G.money<r.cost){notify('Nicht genug Budget!');return;}
  if(G.activeResearch){notify('Bereits eine Forschung aktiv!');return;}
  G.money-=r.cost;
  G.activeResearch=id;
  G.researchTimer=r.time*20;
  notify(`🔬 ${r.n} gestartet!`);
  updateHUD();renderTab();
}

      </div><div style="color:rgba(255,255,255,.2);font-size:.95rem">›</div>
    </div>`;
  });
  document.getElementById('sc').innerHTML=html;
}
function openLex(dinoId){

  document.getElementById('qc').innerHTML=`
    <div class="mh"></div>
    <div class="qmode">
      <button class="qmb ${G.quizMode==='kid'?'on':''}" onclick="setQM('kid')">🐣 Für Kleine</button>
      <button class="qmb ${G.quizMode==='teen'?'on':''}" onclick="setQM('teen')">🔬 Für Grosse</button>
    </div>

    <div class="qq">${curQ.q}</div>
    <div class="qopts">${curQ.opts.map((o,i)=>'<button class="qopt" id="qo'+i+'" onclick="ansQ('+i+')">'+ o+'</button>').join('')}</div>
    <div class="qfact" id="qfact">${curQ.f}</div>
    <div class="qrew" id="qrew">🎉 +💰 ${curQ.r} für den Park!</div>

}
function setQM(m){G.quizMode=m;openQuiz();}
function ansQ(i){
  if(qAns)return;qAns=true;
  const ok=i===curQ.c;
  document.querySelectorAll('.qopt').forEach((b,j)=>{
    if(j===curQ.c)b.classList.add('correct');else if(j===i&&!ok)b.classList.add('wrong');b.onclick=null;
  });
  document.getElementById('qfact').style.display='block';document.getElementById('qnext').style.display='block';
  if(ok){G.money+=curQ.r;updateHUD();document.getElementById('qrew').style.display='block';notify(`🎉 Richtig! +💰${curQ.r}`);}

}

];
if(!G.evLog)G.evLog=[];
if(!G.heatwave)G.heatwave=false;

function maybeFireEvent(){
  if(Math.random()>.13)return;
  const ev=EVENTS_POOL[Math.floor(Math.random()*EVENTS_POOL.length)];
  ev.fn(G);
  G.evLog.unshift({ico:ev.ico,title:ev.title,day:G.day});
  if(G.evLog.length>8)G.evLog.pop();

}
function showEventPopup(ev){
  const el=document.getElementById('evpop');if(!el)return;

  document.getElementById('ev-title').textContent=ev.title;
  document.getElementById('ev-body').textContent=ev.body;

  setTimeout(()=>{if(el)el.style.display='none';},5000);
}
// ==================== HATCHERY ====================
function addEgg(dinoId,encId){
  if(!encId){notify('Kein Gehege! Tippe auf Karte.');return;}
  const d=DINOS.find(x=>x.id===dinoId);if(!d)return;
  if(G.money<d.cost){notify('Nicht genug Geld!');return;}
  G.money-=d.cost;
  const fast=G.research&&G.research.find(r=>r.id==='r_hatch')?.done;
  const days=d.hatchTime*(fast?0.5:1);
  const maxT=days*20;
  G.eggs.push({id:Date.now()+Math.random(),dinoId,encId,timer:maxT,maxT,days});
  notify('\u{1F95A} Ei gelegt! Schlüpft in '+days+' Tagen.');
  updateHUD();
}
function tickEggs(){
  if(!G.eggs||!G.eggs.length)return;
  G.eggs.forEach(egg=>{
    egg.timer--;
    if(egg.timer<=0){
      const enc=G.enclosures.find(e=>e.id===egg.encId);
      if(enc){
        const ag=initAgent(enc,egg.dinoId);
        if(ag)enc.dinos.push(ag);
        const d=DINOS.find(x=>x.id===egg.dinoId);
        notify('\u{1F389} '+d.em+' '+d.n+' ist geschlüpft!');
        showAlert('Dino geschlüpft!',d.n+' ist jetzt im Gehege!');
      }
      egg.timer=-1;
    }
  });
  G.eggs=G.eggs.filter(e=>e.timer>0);
}
function forceHatch(eggId){
  const egg=G.eggs.find(e=>e.id==eggId);
  if(!egg)return;
  egg.timer=0;tickEggs();renderHatch();
}
function renderHatch(){
  const pEnc=G.lastPickerEnc;
  let html='';
  if(G.eggs.length){
    html='<div class="bl">Aktive Eier ('+G.eggs.length+')</div>';
    G.eggs.forEach(egg=>{
      const d=DINOS.find(x=>x.id===egg.dinoId);
      const prog=Math.min(1,1-egg.timer/egg.maxT);
      const dLeft=Math.max(0,Math.ceil(egg.timer/20));
      const ready=dLeft===0;
      html+='<div style="background:rgba(45,107,228,.09);border:1.5px solid '+(ready?'rgba(243,156,18,.6)':'rgba(77,142,255,.15)')+';border-radius:12px;padding:10px;margin-bottom:8px">'
        +'<div style="display:flex;align-items:center;gap:10px">'
        +'<span style="font-size:2rem">'+(prog>0.6?'\u{1F95A}':'\u{1FAB4}')+'</span>'
        +'<div style="flex:1">'
        +'<div style="font-weight:800;color:white;font-size:.82rem">'+d.em+' '+d.n+'-Ei</div>'
        +'<div style="font-size:.7rem;color:var(--text2);margin-top:2px">'+(ready?'Bereit zum Schlüpfen!':dLeft+' Tag'+(dLeft===1?'':'e')+' noch')+'</div>'
        +'<div style="height:5px;background:rgba(255,255,255,.1);border-radius:3px;margin-top:4px;overflow:hidden">'
        +'<div style="height:100%;border-radius:3px;width:'+Math.round(prog*100)+'%;background:'+(ready?'#f39c12':'var(--accent)')+'"></div></div>'
        +'</div>'
        +(ready?'<button onclick="forceHatch('+egg.id+')" style="padding:6px 12px;background:linear-gradient(135deg,#f39c12,#e67e22);border:none;border-radius:9px;color:white;font-weight:800;font-size:.75rem;cursor:pointer;font-family:Nunito,sans-serif;flex-shrink:0">\u{1F423} Schlüpfen!</button>':'')
        +'</div></div>';
    });
  }else{
    html='<div style="font-size:.76rem;color:rgba(255,255,255,.32);text-align:center;padding:1.2rem">Noch keine Eier.<br>Wähle zuerst ein Gehege auf der Karte, dann kaufe ein Ei unten.</div>';
  }
  html+='<div class="bl" style="margin-top:10px">Neues Ei kaufen</div>';
  if(!pEnc)html+='<div style="font-size:.72rem;color:var(--amber);padding:.5rem;background:rgba(243,156,18,.08);border-radius:9px;margin-bottom:7px;text-align:center">Tippe erst auf ein Gehege auf der Karte!</div>';
  html+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:7px">';
  DINOS.filter(d=>isUnlocked(d)).forEach(d=>{
    const ok=pEnc&&G.money>=d.cost;
    html+='<div style="background:rgba(45,107,228,.1);border:1.5px solid rgba(77,142,255,.15);border-radius:11px;padding:8px;text-align:center;cursor:'+(ok?'pointer':'not-allowed')+';opacity:'+(ok?1:0.35)+'"'
      +(ok?' onclick="addEgg(''+d.id+'',G.lastPickerEnc.id);renderHatch()"':'')+'>'      +'<div style="font-size:1.5rem">'+d.em+'</div>'      +'<div style="font-size:.65rem;font-weight:800;color:white">'+d.n+'</div>'      +'<div style="font-size:.58rem;color:var(--amber)">\u{1F4B0} '+d.cost+'</div>'      +'<div style="font-size:.55rem;color:var(--text2)">'+d.hatchTime+' Tage</div>'      +'</div>';
  });
  html+='</div>';
  document.getElementById('sc').innerHTML=html;
}

// ==================== MULTIPLAYER ====================
let mpCh=null;
const MP={connected:false,partner:'',name:'',room:''};

function mpInit(name,room){
  MP.name=name;MP.room=room;
  if(mpCh)try{mpCh.close();}catch(e){}
  mpCh=new BroadcastChannel('dinoparadies_'+room);
  mpCh.onmessage=mpOnMsg;
}
function mpSend(msg){if(mpCh&&MP.connected)mpCh.postMessage({...msg,from:MP.name});}
function mpOnMsg(e){
  const m=e.data;
  if(m.type==='join'){
    MP.partner=m.name;MP.connected=true;
    notify('\u{1F465} '+m.name+' ist beigetreten!');
    mpCh.postMessage({type:'welcome',name:MP.name,from:MP.name,state:mpExport()});
    renderMpTab();
  }
  if(m.type==='welcome'){MP.partner=m.name;MP.connected=true;mpImport(m.state);notify('\u{1F465} Verbunden mit '+m.name+'!');renderMpTab();}
  if(m.type==='state')mpImport(m.state);
  if(m.type==='chat')mpAddChat(m.from,m.text,'them');
  if(m.type==='feed'){
    const enc=G.enclosures.find(x=>x.id===m.encId);
    if(enc){const ag=enc.dinos.find(a=>a.id===m.agId);if(ag){ag.happiness=Math.min(5,ag.happiness+2);notify(m.from+' hat gefüttert! \u2764\uFE0F');}}
  }
  if(m.type==='enc')G.enclosures.push(m.enc);
  if(m.type==='bld')G.buildings.push(m.bld);
  if(m.type==='road')G.roads.push({id:Date.now(),pts:m.pts});
  if(m.type==='event'){showEventPopup(m.ev);if(G.evLog)G.evLog.unshift({...m.ev,day:G.day});}
}
function mpExport(){
  return{money:G.money,day:G.day,
    encs:G.enclosures.map(e=>({...e,dinos:e.dinos.map(a=>({...a,chaseId:null,fleeId:null,_flock:null}))})),
    buildings:G.buildings,roads:G.roads,eggs:G.eggs,research:G.research};
}
function mpImport(s){
  if(!s)return;
  G.money=s.money;G.day=s.day;
  G.enclosures=s.encs.map(e=>({...e,dinos:(e.dinos||[]).map(a=>({...a,chaseId:null,fleeId:null,_flock:null,socialT:0,roarT:0}))}));
  G.buildings=s.buildings||[];G.roads=s.roads||[];G.eggs=s.eggs||[];
  if(s.research)G.research=s.research;
  updateHUD();
}
function mpAddChat(from,text,side){
  const log=document.getElementById('mp-chatlog');if(!log)return;
  const d=document.createElement('div');
  d.style.cssText='padding:4px 8px;border-radius:9px;font-size:.74rem;font-weight:700;max-width:82%;margin-bottom:3px;align-self:'+(side==='me'?'flex-end':'flex-start')+';background:'+(side==='me'?'rgba(45,107,228,.4)':'rgba(255,255,255,.1)')+';color:white';
  d.textContent=side==='me'?text:from+': '+text;
  log.appendChild(d);log.scrollTop=log.scrollHeight;
}
function mpSendChat(){
  const inp=document.getElementById('mp-inp');if(!inp?.value.trim())return;
  mpAddChat(MP.name,inp.value,'me');mpSend({type:'chat',text:inp.value});inp.value='';
}
function mpSticker(s){mpAddChat(MP.name,s,'me');mpSend({type:'chat',text:s});}
function renderMpTab(){
  const sc=document.getElementById('sc');if(!sc)return;
  let html='';
  if(MP.connected){
    html='<div style="background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.3);border-radius:10px;padding:8px;margin-bottom:10px;text-align:center;font-weight:800;font-size:.84rem;color:#2ecc71">\u{1F465} Verbunden mit '+MP.partner+'</div>'
      +'<div class="bl">\u{1F4AC} Chat</div>'
      +'<div id="mp-chatlog" style="height:120px;overflow-y:auto;background:rgba(0,0,0,.22);border-radius:10px;padding:7px;display:flex;flex-direction:column;gap:3px;margin-bottom:7px;scrollbar-width:thin"></div>'
      +'<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:7px">'
      +['\u{1F995}','\u{1F996}','\u{1F44D}','\u2764\uFE0F','\u{1F389}','\u{1F356}','\u{1F95A}','\u{1F4B0}'].map(s=>'<button onclick="mpSticker(''+s+'')" style="background:rgba(255,255,255,.07);border:none;border-radius:8px;width:36px;height:36px;font-size:1rem;cursor:pointer">'+s+'</button>').join('')
      +'</div>'
      +'<div style="display:flex;gap:6px"><input id="mp-inp" placeholder="Nachricht..." maxlength="80" onkeydown="if(event.key==='Enter')mpSendChat()" style="flex:1;padding:8px 10px;background:rgba(255,255,255,.07);border:1px solid rgba(77,142,255,.22);border-radius:9px;color:white;font-family:Nunito,sans-serif;font-size:.84rem;font-weight:700;outline:none">'
      +'<button onclick="mpSendChat()" style="padding:0 14px;background:var(--blue);border:none;border-radius:9px;color:white;font-size:1rem;cursor:pointer">\u27A4</button></div>';
  }else{
    html='<div style="font-size:.76rem;color:var(--text2);margin-bottom:10px;line-height:1.5">Spiele zusammen mit deinem Bruder! Erstelle einen Raum und teile den Code.</div>'
      +'<input id="mp-name" placeholder="Dein Name" maxlength="18" style="width:100%;padding:9px 11px;background:rgba(255,255,255,.07);border:1px solid rgba(77,142,255,.22);border-radius:9px;color:white;font-family:Nunito,sans-serif;font-size:.86rem;font-weight:700;outline:none;margin-bottom:7px">'
      +'<button onclick="mpCreate()" style="width:100%;padding:.68rem;background:var(--blue);border:none;border-radius:11px;color:white;font-family:Nunito,sans-serif;font-weight:800;font-size:.88rem;cursor:pointer;margin-bottom:6px">\u{1F33F} Neuen Raum erstellen</button>'
      +'<div id="mp-codedisp" style="display:none;text-align:center;font-family:Fredoka One,cursive;font-size:2.1rem;color:var(--accent);letter-spacing:7px;padding:10px;background:rgba(0,212,255,.08);border-radius:11px;margin-bottom:7px;border:1px solid rgba(0,212,255,.2)"></div>'
      +'<div style="text-align:center;font-size:.7rem;color:rgba(255,255,255,.32);margin:6px 0">— oder beitreten —</div>'
      +'<input id="mp-joincode" placeholder="Raum-Code (4 Buchst.)" maxlength="4" style="width:100%;padding:9px 11px;background:rgba(255,255,255,.07);border:1px solid rgba(77,142,255,.22);border-radius:9px;color:white;font-family:Nunito,sans-serif;font-size:.86rem;font-weight:700;text-transform:uppercase;outline:none;margin-bottom:6px">'
      +'<button onclick="mpJoin()" style="width:100%;padding:.68rem;background:transparent;border:1.5px solid var(--accent);border-radius:11px;color:var(--accent);font-family:Nunito,sans-serif;font-weight:800;font-size:.88rem;cursor:pointer">\u{1F517} Beitreten</button>';
  }
  sc.innerHTML=html;
}
function mpCreate(){
  const name=(document.getElementById('mp-name')?.value.trim())||'Spieler';
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  MP.room=Array.from({length:4},()=>chars[Math.floor(Math.random()*chars.length)]).join('');
  mpInit(name,MP.room);
  const cd=document.getElementById('mp-codedisp');if(cd){cd.style.display='block';cd.textContent=MP.room;}
  notify('Code: '+MP.room+' — teile ihn!');
}
function mpJoin(){
  const name=(document.getElementById('mp-name')?.value.trim())||'Spieler';
  const code=(document.getElementById('mp-joincode')?.value.trim().toUpperCase())||'';
  if(code.length!==4){notify('4-stelligen Code eingeben!');return;}
  mpInit(name,code);
  mpCh.postMessage({type:'join',name,from:name});
  notify('Verbinde...');
}

let alertTimer;
function showAlert(title,body){
  document.getElementById('at').textContent=title;
  document.getElementById('ab').innerHTML=body;
  const el=document.getElementById('alert-box');el.style.display='block';

let nt;
function notify(msg){
  const el=document.getElementById('notif');el.textContent=msg;el.classList.add('show');

}

// ==================== INIT ====================
function zoomFit(){
  // Zoom to show entire island with margin
  const margin=60;
  const zx=(W-margin*2)/WORLD;
  const zy=(H-margin*2)/WORLD;
  G.zoom=Math.min(zx,zy,ZOOM_MAX);
  G.cam.x=Math.floor(W/2-WORLD*G.zoom/2);
  G.cam.y=Math.floor(H/2-WORLD*G.zoom/2);
  clampCam();
}

function init(){
  generateWorldObjects();
  resize();
  // Start zoomed to show full island
  zoomFit();
  // Place a starter gate near island center
  const cx=WORLD/2,cy=WORLD/2;
  G.buildings.push({id:1,type:'gate',x:cx,y:cy+600});
  initPalette();
  initPlacePicker();
  setTool('enc');
  renderOps();updateHUD();calcSat();
  setTimeout(()=>notify('🌴 Willkommen auf Dinosaurier-Insel! Scrollrad oder Pinch zum Zoomen!'),700);
  setTimeout(()=>notify('💡 🌍 Knopf oben rechts = Ganze Insel sehen!'),4500);
  requestAnimationFrame(loop);
}
init();

    <button onclick="document.getElementById('install-banner').style.display='none'"
      style="padding:6px 8px;background:rgba(255,255,255,.1);border:none;border-radius:9px;
      color:rgba(255,255,255,.5);font-size:.9rem;cursor:pointer;flex-shrink:0">✕</button>
  </div>
</div>
